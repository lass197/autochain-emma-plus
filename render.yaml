# Blueprint Render — Autochain Emma+ (gratuit)
#
# Avant Deploy, dans Environment :
# - DATABASE_URL = Internal Database URL (même région que le service)
# - APP_URL = https://autochain-emma-plus.onrender.com

services:
  - type: web
    name: autochain-emma-plus
    runtime: docker
    plan: free
    healthCheckPath: /up
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: Autochain Emma+
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://autochain-emma-plus.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SEED_ON_DEPLOY
        value: "true"
      - key: AUTOCHAIN_ALLOW_SIMULATE_FALLBACK
        value: "true"
      - key: PORT
        value: "10000"
