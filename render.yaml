# Blueprint Render — Autochain Emma+ (plan gratuit)
# Une seule base Postgres free est autorisée par compte.
# Ce Blueprint ne crée PAS de nouvelle DB : utilise ta base free existante.
#
# Après création du Blueprint :
# 1. Dashboard → ta base Postgres free → copie "Internal Database URL"
# 2. Service web autochain-emma-plus → Environment → colle-la dans DATABASE_URL
# 3. Définis aussi APP_URL = https://<ton-service>.onrender.com
# 4. Manual Deploy → Deploy latest commit

services:
  - type: web
    name: autochain-emma-plus
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /up
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: Autochain Emma+
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      # Colle l'Internal Database URL de ta Postgres free existante
      - key: DATABASE_URL
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: AUTOCHAIN_ALLOW_SIMULATE_FALLBACK
        value: "true"
      - key: AUTOCHAIN_REQUIRE_DOUBLE_SIGNATURE
        value: "true"
      - key: AUTOCHAIN_BLOCKCHAIN_NETWORK
        value: simulate
      - key: SEED_ON_DEPLOY
        value: "true"
