# Autochain Emma+ — Render Free
# Démarre même sans DATABASE_URL (SQLite temporaire).
# Optionnel : ajoute DATABASE_URL (Internal URL Postgres) pour une DB persistante.

services:
  - type: web
    name: autochain-emma-plus
    runtime: docker
    plan: free
    healthCheckPath: /health.php
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: Autochain Emma+
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://autochain-emma-plus.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SEED_ON_DEPLOY
        value: "true"
      - key: AUTOCHAIN_ALLOW_SIMULATE_FALLBACK
        value: "true"
      - key: PORT
        value: "10000"
      # Optionnel — Internal Database URL Postgres (même région)
      - key: DATABASE_URL
        sync: false
