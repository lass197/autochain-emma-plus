# Blueprint Render — Autochain Emma+ (plan gratuit)
#
# IMPORTANT avant Deploy :
# 1. Environment → DATABASE_URL = Internal Database URL de ta Postgres free existante
# 2. Environment → APP_URL = https://autochain-emma-plus.onrender.com
# 3. La région du web service DOIT être la même que ta base Postgres
# 4. Manual Deploy

services:
  - type: web
    name: autochain-emma-plus
    runtime: docker
    plan: free
    healthCheckPath: /up
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: Autochain Emma+
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://autochain-emma-plus.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: AUTOCHAIN_ALLOW_SIMULATE_FALLBACK
        value: "true"
      - key: AUTOCHAIN_REQUIRE_DOUBLE_SIGNATURE
        value: "true"
      - key: AUTOCHAIN_BLOCKCHAIN_NETWORK
        value: simulate
      - key: SEED_ON_DEPLOY
        value: "true"
      - key: PORT
        value: "10000"
